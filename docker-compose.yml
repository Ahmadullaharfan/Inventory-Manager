services:
  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: inventory-manager-laravel:latest
    container_name: laravel_app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel_db
      DB_USERNAME: laravel_user
      DB_PASSWORD: laravel_password
      APP_KEY: base64:8q4C+7s9e2V5n8X1l4Q6w3D7j9P2m5R8t1Y4u7I0o3K6
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "if [ -f artisan ]; then php artisan serve --host=0.0.0.0 --port=8000; else php -S 0.0.0.0:8000 -t . 2>/dev/null || echo 'Replace backend/ with your Laravel project'; fi"

  angular_app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: inventory-manager-angular:latest
    container_name: angular_app
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - angular_node_modules:/app/node_modules
    command: npm start

volumes:
  mysql_data:
  angular_node_modules:
