<div class="flex flex-col gap-1 w-full">
  <label *ngIf="label" class="text-sm font-medium text-gray-700">
    {{ label }}
  </label>

  <input
    [type]="type"
    [placeholder]="placeholder"
    [value]="value"
    [disabled]="disabled"
    (input)="handleInput($event)"
    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-black disabled:bg-gray-100"
  />
</div>
