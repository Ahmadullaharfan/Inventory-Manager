<div class="mx-auto">
  <table class="min-w-full border border-gray-200 rounded-lg" *ngIf="data.length > 0">
    <thead class="bg-gray-50">
      <tr>
        <th *ngFor="let column of columns" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          {{ column.label }}
        </th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-200">
      <tr *ngFor="let row of data" class="hover:bg-gray-50">
        <td *ngFor="let column of columns; let i = index" class="px-6 py-2 whitespace-nowrap text-sm font-medium text-gray-900" [ngClass]="{'max-w-md truncate': column.key === 'description'}">
          <ng-container *ngIf="column.key !== 'actions'; else actionsTemplate">
            {{ column.key === 'price' ? formatPrice(row[column.key]) : (row[column.key] || '-') }}
          </ng-container>
          <ng-template #actionsTemplate>
            <div class="space-x-2">
              <button 
                class="transition duration-200 px-4 py-1 hover:text-blue-900 text-blue-500 rounded text-xs" 
                (click)="onEdit(row)">
                <i class="fa-solid fa-pen-to-square"></i>
              </button>
              <button 
              
                class=" transition duration-200 hover:text-red-900  text-red-500 px-4 py-1 rounded text-xs" 
                (click)="onDelete(row)">
                <i class="fa-solid fa-trash "></i>
              </button>
            </div>
          </ng-template>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Empty state -->
  <div *ngIf="data.length === 0" class="text-center py-12">
    <p class="text-gray-500 text-lg">No data found.</p>
  </div>
</div>
