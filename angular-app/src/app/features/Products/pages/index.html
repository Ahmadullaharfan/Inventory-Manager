<div class="container pl-4 pr-4 mx-auto flex justify-between items-center">
  <h1 class="text-3xl font-bold text-gray-900 mb-8">Products Management</h1>
  <button (click)="toggleForm()" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg shadow-md transition duration-200 mb-8">Add New Product</button>
</div>
<div class="container pl-4 pr-4 mx-auto flex justify-between items-center">
    <table class="min-w-full bg-white border border-gray-200 rounded-lg shadow-md">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Price</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-200">
      <tr *ngFor="let product of products()" class="hover:bg-gray-50 even:bg-gray-50">
        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{product.id}}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{product.name}}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${{product.price}}</td>
        <td class="px-6 py-4 text-sm text-gray-900 max-w-md truncate">{{product.description}}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
          <button class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-1 rounded text-xs transition duration-200" (click)="toggleForm(product.id)">Edit</button>
          <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded text-xs transition duration-200" (click)="onDelete(product.id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Empty state -->
<div *ngIf="products().length === 0" class="text-center py-12">
  <p class="text-gray-500 text-lg">No products found. Add your first product!</p>
</div>

<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" *ngIf="showForm()">
  <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full mx-4 max-h-[90vh] overflow-y-auto">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">{{ selectedId ? 'Edit Product' : 'Add Product' }}</h2>
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Name</label>
        <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="name" formControlName="name">
        <div *ngIf="productForm.get('name')?.invalid && productForm.get('name')?.touched" class="mt-1 text-sm text-red-600">
          Name is required
        </div>
      </div>
      <div>
        <label for="price" class="block text-sm font-medium text-gray-700 mb-2">Price</label>
        <input type="number" step="0.01" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="price" formControlName="price">
        <div *ngIf="productForm.get('price')?.invalid && productForm.get('price')?.touched" class="mt-1 text-sm text-red-600">
          Price must be positive
        </div>
      </div>
      <div>
        <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Description</label>
        <textarea class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-vertical min-h-[100px]" id="description" formControlName="description"></textarea>
      </div>
      <div class="flex gap-3 pt-4">
        <button type="submit" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg shadow-md transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed" [disabled]="productForm.invalid">Save</button>
        <button type="button" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded-lg shadow-md transition duration-200" (click)="resetForm()">Cancel</button>
      </div>
    </form>
  </div>
</div>
